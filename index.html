  const sorted=[...rows].sort((a,b)=>parseFloat(b.weight_pct||0)-parseFloat(a.weight_pct||0));
  const maxW=parseFloat(sorted[0]?.weight_pct||1);

  const holdingsHtml=sorted.map(h=>{
    const wPct=(parseFloat(h.weight_pct||0)*100).toFixed(1);
    const isSel=!!state.portSelected[h.symbol];
    const tagLine=h.sector||h.geography
      ?`${h.sector}${h.sector&&h.geography?' · ':''}${h.geography}`
      :'<span style="color:var(--warn-txt)">untagged</span>';
    const clickAction=selMode?`togglePortSelect('${h.symbol}')`:`goToTicker('${h.symbol}')`;
    return`<div class="ticker-row" onclick="${clickAction}" style="${isSel?'border-color:var(--accent);background:var(--accent2);':''}">

      <div style="text-align:right;min-width:52px"><div class="ticker-count">${wPct}%</div></div>
    </div>`;
  }).join('');

  return connectBtn+syncInfo+summaryHtml+
    `<div class="section-label">Sector</div><div class="ticker-list" style="margin-bottom:16px">${sectorHtml}</div>`+
    geoSection+
    `<div class="section-label">Holdings (${sorted.length}) — by weight</div>`+
    tagToolbar+

function detectDelimiter(text){
  // Look at the first few lines; whichever delimiter appears more consistently wins
  const sample=text.split(/\r?\n/).slice(0,5);
  let commas=0,tabs=0;
  sample.forEach(l=>{
    commas+=(l.match(/,/g)||[]).length;
    tabs+=(l.match(/\t/g)||[]).length;
  });
  return tabs>commas?'\t':',';
}

function parseCsvLine(line,delim){
  const d=delim||',';
  const parts=[];let cur='';let inQ=false;
  for(const ch of line){
    if(ch==='"'){inQ=!inQ;}
    else if(ch===d&&!inQ){parts.push(cur.trim());cur='';}
    else{cur+=ch;}
  }
  parts.push(cur.trim());
  return parts;
}

function importPortfolioCsv(){
  let csv=(document.getElementById('portfolioCsvInput')?.value||'');
  // strip BOM / zero-width chars that the broker export scatters around
  csv=csv.replace(/[\uFEFF\u200B\u200C\u200D]/g,'').trim();
  if(!csv){showToast('Paste your broker CSV first');return;}
  const totalVal=parseFloat(document.getElementById('portfolioTotalInput')?.value||'0')||0;

  const delim=detectDelimiter(csv);
  const lines=csv.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  const rows=lines.map(l=>parseCsvLine(l,delim));

  // locate header row (Symbol,Name,...) and the Market Value £ column
  let headerIdx=rows.findIndex(r=>(r[0]||'').toLowerCase()==='symbol');
  let mvCol=6; // default position of "Market Value £" in the broker export
  if(headerIdx>=0){
    const hdr=rows[headerIdx].map(c=>c.toLowerCase());
    const found=hdr.findIndex(c=>c.includes('market value £')||c.includes('market value gbp'));
    if(found>=0)mvCol=found;
  }
  const dataRows=headerIdx>=0?rows.slice(headerIdx+1):rows;

  // Currency codes appear in the broker's totals block, never as holdings
  const CURRENCY_CODES=new Set(['GBP','USD','CAD','AUD','EUR','CHF','JPY','NZD','HKD','SEK','NOK','DKK','SGD','ZAR','TOTALS','TOTAL']);
  const holdings=[];
  const seen=new Set();
  for(const r of dataRows){
    const sym=(r[0]||'').replace(/"/g,'').trim().toUpperCase();
    if(!sym)continue;                             // totals rows have an empty symbol
    if(CURRENCY_CODES.has(sym))continue;          // skip the totals-by-currency block
    if(!/^[A-Z0-9.]{1,10}$/.test(sym))continue;   // reject phantom rows from stray delimiters
    if(seen.has(sym))continue;                    // guard against duplicate rows
    const name=(r[1]||'').trim();
    const mv=parseMV(r[mvCol]||'');
    if(!(mv>0))continue;                          // holdings have a positive market value
    seen.add(sym);
    holdings.push({symbol:sym,name,mv});
  }
  if(!holdings.length){showToast('No holdings found — check the paste');return;}

  // Sanity check: symbols should be short alphanumeric codes.
  // If most "symbols" look like numbers or long strings, the delimiter was wrong.
  const looksValid=holdings.filter(h=>/^[A-Z0-9.]{1,10}$/.test(h.symbol)).length;
  if(looksValid < holdings.length*0.7){
    showToast('Parse failed — open the CSV in Notepad and copy from there, not Excel');
    return;
  }

  const investedTotal=holdings.reduce((s,h)=>s+h.mv,0);
  const denom=totalVal>0?totalVal:investedTotal;

  state.portfolio=holdings.map(h=>({
    symbol:h.symbol,
    name:h.name,
    weight_pct:denom>0?h.mv/denom:0,
  }));
  const cashVal=totalVal>0?Math.max(0,totalVal-investedTotal):0;
  state.portfolioMeta={
    totalValue:    totalVal,
    investedValue: investedTotal,
    cashGbp:       cashVal,
    cashPct:       totalVal>0?cashVal/totalVal:0,
    snapshotDate:  new Date().toLocaleDateString('en-GB'),
  };
  state.portfolioSyncedAt=new Date().toISOString();
  save();closeModal();render();
  const newUntagged=state.portfolio.filter(h=>{const t=state.tickerTags[h.symbol]||{};return!t.sector&&!t.geography;}).length;
  showToast('Imported '+holdings.length+' holdings'+(newUntagged?' — '+newUntagged+' untagged':''));
  if(state.driveSynced)scheduleDriveSync();
}

function parseWeight(val){
  // handles "3.25%" or "0.0325" from Sheets
  const s=String(val).replace(/[£%,\s]/g,'');
  const n=parseFloat(s);
  if(isNaN(n))return 0;
  return n>1?n/100:n; // if >1 assume it came as percentage string
}
function parseMV(val){
  const s=String(val).replace(/[£,\s]/g,'');
  const n=parseFloat(s);
  return isNaN(n)?0:n;
}

const OAUTH_REDIRECT = location.origin + location.pathname;
const OAUTH_SCOPES   = 'https://www.googleapis.com/auth/drive.file';

// Called on page load — complete the OAuth code exchange if we were redirected back
(async function handleOAuthRedirect(){
  const params = new URLSearchParams(location.search);
  const code       = params.get('code');
  const oauthState = params.get('state');   // CSRF token — NOT the app's state object
  if(!code || oauthState !== 'invest_diary_oauth') return;
  // Clean URL without reloading
  history.replaceState({}, '', location.pathname);
  const stored = JSON.parse(sessionStorage.getItem('oauth_pending')||'{}');
  if(!stored.clientId || !stored.clientSecret){showToast('OAuth error: credentials missing');return;}
  try{
    const res = await fetch('https://oauth2.googleapis.com/token',{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body: new URLSearchParams({
        code, client_id: stored.clientId, client_secret: stored.clientSecret,
        redirect_uri: OAUTH_REDIRECT, grant_type: 'authorization_code'
      })
    });
    const data = await res.json();
    if(data.error) throw new Error(data.error_description||data.error);
    state.oauthClientId     = stored.clientId;
    state.oauthClientSecret = stored.clientSecret;
    state.oauthRefreshToken = data.refresh_token;
    state.oauthAccessToken  = data.access_token;
    state.oauthExpiry       = Date.now() + (data.expires_in - 60) * 1000;
    state.driveSynced       = true;
    // share with Sheets
    state.sheetsToken = data.access_token;
    sessionStorage.removeItem('oauth_pending');
    save();
    updateSyncBadge('ok');
    showToast('Connected — syncing…');
    pushToDrive();
  }catch(e){showToast('OAuth failed: '+e.message);}
})();

async function getAccessToken(){
  // Return cached token if still valid
  if(state.oauthAccessToken && Date.now() < state.oauthExpiry){
    return state.oauthAccessToken;
  }
  // Use refresh token to get a new access token silently
  if(!state.oauthRefreshToken || !state.oauthClientId || !state.oauthClientSecret){
    return null;
  }
  try{
    const res = await fetch('https://oauth2.googleapis.com/token',{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body: new URLSearchParams({
        refresh_token: state.oauthRefreshToken,
        client_id:     state.oauthClientId,
        client_secret: state.oauthClientSecret,
        grant_type:    'refresh_token'
      })
    });
    const data = await res.json();
    if(data.error) throw new Error(data.error_description||data.error);
    state.oauthAccessToken = data.access_token;
    state.oauthExpiry      = Date.now() + (data.expires_in - 60) * 1000;
    state.sheetsToken      = data.access_token;
    save();
    return data.access_token;
  }catch(e){
    updateSyncBadge('error');
    return null;
  }
}

// A previously-saved tab may no longer exist
if(!['log','memos','portfolio','news','tickers'].includes(state.activeTab))state.activeTab='log';

let syncTimer;
function scheduleDriveSync(){clearTimeout(syncTimer);syncTimer=setTimeout(pushToDrive,2000);}
function syncNow(){
  openOAuthSetup();
}

function openOAuthSetup(){
  const root=document.getElementById('modalRoot');
  const isConnected = !!state.oauthRefreshToken;
  root.innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">${isConnected?'Google account connected':'Connect Google account'}</div>
        <button class="icon-btn" onclick="closeModal()">✕</button>
      </div>
      ${isConnected
        ? `<div style="font-size:13px;color:var(--ink2);line-height:1.7;margin-bottom:14px">
            Your diary syncs automatically to Drive.<br>
            <span style="font-family:var(--font-mono);font-size:11px;color:var(--ink3)">drive.file scope only — no other Drive access.</span>
           </div>
           <div class="modal-footer" style="flex-wrap:wrap;gap:8px">
             <button class="btn btn-ghost" style="color:var(--danger);border-color:var(--danger)" onclick="disconnectOAuth()">Disconnect</button>
             <button class="btn btn-ghost" onclick="reAuthenticate()">Re-authenticate</button>
             <button class="btn btn-ghost" onclick="closeModal();restoreFromDrive()">Restore</button>
             <button class="btn btn-primary" onclick="closeModal();pushToDrive()">Sync now</button>
           </div>`
        : `<div style="font-size:13px;color:var(--ink2);line-height:1.7;margin-bottom:14px">
            You'll need a <strong>Google Cloud OAuth 2.0 Client ID</strong>.<br>
            <a href="https://console.cloud.google.com/apis/credentials" target="_blank" style="color:var(--accent)">Open Google Cloud Console →</a>
           </div>
           <div class="field-row">
             <div class="field-label">Client ID</div>
             <input class="field-input" id="oauthClientId" placeholder="xxxx.apps.googleusercontent.com" value="${state.oauthClientId||''}">
           </div>
           <div class="field-row">
             <div class="field-label">Client Secret</div>
             <input class="field-input" id="oauthClientSecret" placeholder="GOCSPX-…" type="password" value="${state.oauthClientSecret||''}">
           </div>
           <div style="font-size:11px;font-family:var(--font-mono);color:var(--ink3);margin-bottom:12px;line-height:1.6">
             Authorised redirect URI to add in Cloud Console:<br>
             <span style="color:var(--ink)">${OAUTH_REDIRECT}</span>
           </div>
           <div class="modal-footer">
             <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
             <button class="btn btn-primary" onclick="startOAuthFlow()">Authorise with Google</button>
           </div>`
      }
    </div>
  </div>`;
}

function startOAuthFlow(){
  const clientId     = document.getElementById('oauthClientId')?.value?.trim();
  const clientSecret = document.getElementById('oauthClientSecret')?.value?.trim();
  if(!clientId||!clientSecret){showToast('Enter Client ID and Secret');return;}
  // Store credentials temporarily so the redirect handler can use them
  sessionStorage.setItem('oauth_pending', JSON.stringify({clientId, clientSecret}));
  const params = new URLSearchParams({
    client_id:     clientId,
    redirect_uri:  OAUTH_REDIRECT,
    response_type: 'code',
    scope:         OAUTH_SCOPES,
    access_type:   'offline',
    prompt:        'consent',   // force refresh_token even if previously granted
    state:         'invest_diary_oauth'
  });
  location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params;
}

function disconnectOAuth(){
  if(!confirm('Disconnect Google account? Diary entries stay local.'))return;
  state.oauthClientId=null;state.oauthClientSecret=null;
  state.oauthRefreshToken=null;state.oauthAccessToken=null;
  state.oauthExpiry=0;state.driveSynced=false;
  save();closeModal();updateSyncBadge('disconnected');showToast('Disconnected');
}
async function restoreFromDrive(){
  const hasLocal=state.entries.length||state.memos.length||Object.keys(state.tickerTags).length;
  if(hasLocal&&!confirm('Restore from Drive? This replaces the data on this device with the Drive backup.'))return;
  await pullFromDrive({silent:false});
}

function reAuthenticate(){
  state.oauthRefreshToken=null;state.oauthAccessToken=null;
  state.oauthExpiry=0;state.driveSynced=false;
  save();closeModal();
  setTimeout(openOAuthSetup,100);
}

function refreshSyncBadge(){
  // Keep the badge in step with the real connection state on every render
  if(!state.oauthRefreshToken){updateSyncBadge('disconnected');return;}
  const badge=document.getElementById('syncBadge');
  if(badge&&badge.classList.contains('error'))return;   // leave an error visible
  if(badge&&badge.classList.contains('syncing')&&document.getElementById('syncLabel')?.textContent==='Syncing…')return;
  updateSyncBadge('ok');
}
function updateSyncBadge(status){
  const badge=document.getElementById('syncBadge');
  const dot=document.getElementById('syncDot');
  const label=document.getElementById('syncLabel');
  badge.className='sync-badge';dot.className='dot';
  if(status==='syncing'){badge.classList.add('syncing');dot.classList.add('pulse');label.textContent='Syncing…';}
  else if(status==='ok'){badge.classList.add('syncing');label.textContent='Drive ✓';}
  else if(status==='error'){badge.classList.add('error');label.textContent='Sync error';}
  else{label.textContent='Connect Drive';}
}

async function findDriveFile(token){
  if(state.driveFileId)return state.driveFileId;
  const res=await fetch(`https://www.googleapis.com/drive/v3/files?q=name%3D'investment-diary.json'+and+trashed%3Dfalse&fields=files(id,name,modifiedTime)`,{headers:{Authorization:`Bearer ${token}`}});
  const data=await res.json();
  if(data.files&&data.files.length){
    state.driveFileId=data.files[0].id;
    save();
    return state.driveFileId;
  }
  return null;
}

async function pullFromDrive(opts){
  const silent=opts&&opts.silent;
  const token=await getAccessToken();
  if(!token){if(!silent)showToast('Not connected to Drive');return false;}
  try{
    const fileId=await findDriveFile(token);
    if(!fileId){if(!silent)showToast('No backup found in Drive');return false;}
    const res=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{headers:{Authorization:`Bearer ${token}`}});
    if(!res.ok)throw new Error('Could not read the Drive backup');
    const remote=await res.json();
    if(!remote||typeof remote!=='object')throw new Error('Drive backup is not readable');

    const remoteTime=remote.lastSync?new Date(remote.lastSync).getTime():0;
    const localTime=state.lastLocalChange||0;
    const localEmpty=!state.entries.length&&!state.memos.length&&!Object.keys(state.tickerTags).length;

    // Only overwrite local data when the Drive copy is genuinely newer,
    // or when there is nothing local to lose.
    if(!localEmpty && remoteTime<=localTime){
      if(!silent)showToast('Local copy is already up to date');
      return false;
    }

    state.entries=remote.entries||[];
    state.memos=remote.memos||[];
    state.tickerTags=remote.tickerTags||{};
    if(remote.newsCache)state.newsCache=remote.newsCache;
    if(remote.portfolio)state.portfolio=remote.portfolio;
    if(remote.portfolioMeta)state.portfolioMeta=remote.portfolioMeta;
    if(remote.portfolioSyncedAt)state.portfolioSyncedAt=remote.portfolioSyncedAt;
    state.lastLocalChange=remoteTime;
    save();render();
    showToast('Restored from Drive — '+state.entries.length+' entries, '+state.memos.length+' memos');
    return true;
  }catch(e){
    if(!silent)showToast('Drive restore failed: '+e.message);
    return false;
  }
}

async function pushToDrive(){
  const token = await getAccessToken();
  if(!token){
    if(state.oauthRefreshToken) updateSyncBadge('error');
    return;
  }
  // Safety: never let an empty device overwrite a Drive backup that has data.
  const localEmpty=!state.entries.length&&!state.memos.length&&!Object.keys(state.tickerTags).length;
  if(localEmpty){
    try{
      const fid=await findDriveFile(token);
      if(fid){
        const chk=await fetch(`https://www.googleapis.com/drive/v3/files/${fid}?alt=media`,{headers:{Authorization:`Bearer ${token}`}});
        if(chk.ok){
          const rem=await chk.json();
          const remoteHasData=(rem.entries&&rem.entries.length)||(rem.memos&&rem.memos.length)||(rem.tickerTags&&Object.keys(rem.tickerTags).length);
          if(remoteHasData){
            updateSyncBadge('ok');
            showToast('Drive has data this device does not — use Restore, not Sync');
            return;
          }
        }
      }
    }catch(e){/* if the check fails, fall through to a normal sync */}
  }
  updateSyncBadge('syncing');
  const now=new Date().toISOString();
  state.lastLocalChange=Date.now();
  const data=JSON.stringify({
    entries:state.entries,memos:state.memos,tickerTags:state.tickerTags,
    portfolio:state.portfolio,portfolioMeta:state.portfolioMeta,portfolioSyncedAt:state.portfolioSyncedAt,
    newsCache:state.newsCache,
    lastSync:now
  },null,2);
  try{
    let fileId=state.driveFileId;
    if(!fileId){
      const searchRes=await fetch(`https://www.googleapis.com/drive/v3/files?q=name%3D'investment-diary.json'+and+trashed%3Dfalse&fields=files(id,name)`,{headers:{Authorization:`Bearer ${token}`}});
      const searchData=await searchRes.json();
      if(searchData.files?.length)fileId=searchData.files[0].id;
    }
    if(fileId){
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,{method:'PATCH',headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},body:data});
    }else{
      const meta={name:'investment-diary.json',mimeType:'application/json'};
      const createRes=await fetch('https://www.googleapis.com/drive/v3/files',{method:'POST',headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify(meta)});
      const created=await createRes.json();
      fileId=created.id;
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,{method:'PATCH',headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},body:data});
    }
    state.driveFileId=fileId;save();updateSyncBadge('ok');
  }catch(err){updateSyncBadge('error');showToast('Drive sync failed');}
}

// Keep the batch countdown honest without re-rendering the whole app
let batchTicker=null;
function ensureBatchTicker(){
  if(state.newsBatch&&!batchTicker){
    batchTicker=setInterval(()=>{
      if(!state.newsBatch){clearInterval(batchTicker);batchTicker=null;return;}
      // Repaint only the progress bar — a full render on a 68-row list every
      // second makes the whole app feel unresponsive
      const bar=document.getElementById('batchBar');
      if(bar)bar.outerHTML=renderBatchBar();
    },1000);
  }else if(!state.newsBatch&&batchTicker){
    clearInterval(batchTicker);batchTicker=null;
  }
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}
render();
// Set initial sync badge state based on persisted OAuth
(async function initBadge(){
  if(!state)return;
  if(state.oauthRefreshToken){
    updateSyncBadge('ok');
    // Warm up the access token so the first real sync doesn't fail
    const t=await getAccessToken();
    updateSyncBadge(t?'ok':'error');
    // If this device has no data (new browser, cleared cache), pull the backup down
    const localEmpty=!state.entries.length&&!state.memos.length&&!Object.keys(state.tickerTags).length;
    if(t&&localEmpty)await pullFromDrive({silent:true});
  }else if(state.driveSynced){
    state.driveSynced=false;state.driveToken=null;
    save();updateSyncBadge('disconnected');
  }
})();
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js')
      .catch(e=>console.warn('SW registration failed:',e));
  });
}
