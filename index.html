<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a6b3c" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1c1b18" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="invest.diary">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>invest.diary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --ink:#1a1a1a;--ink2:#4a4a4a;--ink3:#8a8a8a;--surface:#ffffff;--surface2:#f7f6f3;--surface3:#f0ede8;
    --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
    --accent:#1a6b3c;--accent2:#e8f5ee;--accent3:#c8e8d5;
    --tag-bg:#eef4ff;--tag-txt:#2255aa;--hash-bg:#fff8e8;--hash-txt:#a05800;
    --danger:#c0392b;--warn-bg:#fff3e0;--warn-txt:#b05000;
    --conviction-1:#e8f0ff;--conviction-1t:#3355bb;
    --conviction-2:#e8f5ee;--conviction-2t:#1a6b3c;
    --conviction-3:#fff8e0;--conviction-3t:#a07000;
    --conviction-4:#fff0e8;--conviction-4t:#b04000;
    --conviction-5:#fce8e8;--conviction-5t:#a01515;
    --r:10px;--r2:16px;--shadow:0 1px 4px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.04);
    --font-body:'Geist',sans-serif;--font-serif:'DM Serif Display',serif;--font-mono:'DM Mono',monospace;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --ink:#e8e6e0;--ink2:#aaa89f;--ink3:#66645e;--surface:#1c1b18;--surface2:#242320;--surface3:#2c2b27;
      --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
      --accent:#4cae7a;--accent2:#0f2a1a;--accent3:#1a4030;
      --tag-bg:#1a2240;--tag-txt:#7aaaf0;--hash-bg:#2a2010;--hash-txt:#e09020;
      --conviction-1:#1a2240;--conviction-1t:#7aaaf0;
      --conviction-2:#0f2a1a;--conviction-2t:#4cae7a;
      --conviction-3:#2a2010;--conviction-3t:#e09020;
      --conviction-4:#2a1a10;--conviction-4t:#e07040;
      --conviction-5:#2a1010;--conviction-5t:#e05050;
      --shadow:0 1px 4px rgba(0,0,0,0.3),0 4px 16px rgba(0,0,0,0.2);
    }
  }
  body{font-family:var(--font-body);background:var(--surface2);color:var(--ink);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
  #app{display:flex;flex-direction:column;max-width:480px;margin:0 auto;min-height:100vh;background:var(--surface);position:relative}
  .topbar{padding:14px 16px 10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:100;display:flex;flex-direction:column;gap:8px}
  .topbar-row{display:flex;align-items:center;justify-content:space-between}
  .brand{font-family:var(--font-serif);font-size:20px;color:var(--ink);letter-spacing:-0.3px}
  .brand span{color:var(--accent)}
  .sync-badge{font-size:11px;font-family:var(--font-mono);padding:3px 8px;border-radius:20px;border:1px solid var(--border2);color:var(--ink3);cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .2s}
  .sync-badge:hover{border-color:var(--accent);color:var(--accent)}
  .sync-badge.syncing{color:var(--accent);border-color:var(--accent3)}
  .sync-badge.error{color:var(--danger);border-color:var(--danger)}
  .dot{width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block}
  .dot.pulse{animation:pulse 1.4s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .search-bar{display:flex;align-items:center;gap:8px;background:var(--surface2);border-radius:var(--r);padding:0 10px;border:1px solid var(--border)}
  .search-bar input{flex:1;background:transparent;border:none;outline:none;font-size:14px;font-family:var(--font-body);color:var(--ink);padding:8px 0}
  .search-bar input::placeholder{color:var(--ink3)}
  .search-icon{font-size:14px;color:var(--ink3)}
  .tabs{display:flex;padding:0 16px;border-bottom:1px solid var(--border);gap:0;background:var(--surface);overflow-x:auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{padding:10px 14px;font-size:13px;font-weight:500;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .scroll-area{flex:1;overflow-y:auto;padding:16px}
  .compose-card{background:var(--surface);border-radius:var(--r2);border:1px solid var(--border2);padding:14px;margin-bottom:16px;box-shadow:var(--shadow)}
  .compose-label{font-size:11px;font-family:var(--font-mono);color:var(--ink3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px}
  .compose-area{width:100%;min-height:80px;border:none;outline:none;font-size:15px;font-family:var(--font-body);color:var(--ink);background:transparent;resize:none;line-height:1.6}
  .compose-area::placeholder{color:var(--ink3)}
  .compose-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
  .preview-tags{display:flex;flex-wrap:wrap;gap:4px;flex:1}
  .tag{font-size:12px;font-family:var(--font-mono);padding:2px 8px;border-radius:20px;cursor:pointer;transition:opacity .15s}
  .tag:hover{opacity:.75}
  .tag.ticker{background:var(--tag-bg);color:var(--tag-txt)}
  .tag.hash{background:var(--hash-bg);color:var(--hash-txt)}
  .btn{padding:7px 14px;border-radius:var(--r);border:none;cursor:pointer;font-size:13px;font-family:var(--font-body);font-weight:500;transition:all .15s}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{opacity:.88}
  .btn-primary:disabled{opacity:.45;cursor:not-allowed}
  .btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--ink2)}
  .btn-ghost:hover{background:var(--surface2)}
  .btn-sm{padding:5px 10px;font-size:12px}
  .entry-card{background:var(--surface);border-radius:var(--r2);border:1px solid var(--border);padding:14px;margin-bottom:10px;box-shadow:var(--shadow);transition:box-shadow .2s}
  .entry-card:hover{box-shadow:0 2px 8px rgba(0,0,0,0.09),0 6px 24px rgba(0,0,0,0.06)}
  .entry-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .entry-date{font-size:11px;font-family:var(--font-mono);color:var(--ink3)}
  .entry-actions{display:flex;gap:6px}
  .icon-btn{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:14px;padding:2px 4px;border-radius:4px;transition:color .15s}
  .icon-btn:hover{color:var(--ink)}
  .entry-body{font-size:14px;line-height:1.65;color:var(--ink2);white-space:pre-wrap;word-break:break-word}
  .entry-body strong{font-weight:500;color:var(--ink)}
  .entry-body em{font-style:italic}
  .entry-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
  .entry-news-btn{display:flex;align-items:center;gap:5px;margin-top:10px;padding:6px 10px;border-radius:var(--r);border:1px dashed var(--border2);background:transparent;cursor:pointer;font-size:12px;font-family:var(--font-mono);color:var(--ink3);width:100%;justify-content:center;transition:all .2s}
  .entry-news-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent2)}
  .news-panel{background:var(--surface2);border-radius:var(--r);padding:12px;margin-top:10px;border:1px solid var(--border)}
  .news-panel-header{font-size:11px;font-family:var(--font-mono);color:var(--ink3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
  .news-item{padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer}
  .news-item:last-child{border-bottom:none}
  .news-item-title{font-size:13px;color:var(--ink);font-weight:500;margin-bottom:2px}
  .news-item-meta{font-size:11px;color:var(--ink3);font-family:var(--font-mono)}
  .news-config{padding:8px;background:var(--warn-bg);border-radius:var(--r);font-size:12px;color:var(--warn-txt);line-height:1.5}
  .empty-state{text-align:center;padding:48px 24px;color:var(--ink3)}
  .empty-icon{font-size:36px;margin-bottom:12px;opacity:.4}
  .empty-title{font-family:var(--font-serif);font-size:18px;color:var(--ink2);margin-bottom:6px}
  .empty-body{font-size:13px;line-height:1.6}
                              .analytics-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
  .metric-card{background:var(--surface2);border-radius:var(--r);padding:12px;border:1px solid var(--border)}
  .metric-label{font-size:11px;font-family:var(--font-mono);color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
  .metric-value{font-size:24px;font-weight:500;color:var(--ink);font-family:var(--font-serif)}
  .metric-sub{font-size:11px;color:var(--ink3);margin-top:2px}
  .ticker-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
  .ticker-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface);border-radius:var(--r);border:1px solid var(--border);cursor:pointer;transition:all .2s}
  .ticker-row:hover{border-color:var(--accent3);background:var(--accent2)}
  .ticker-name{font-family:var(--font-mono);font-weight:500;color:var(--tag-txt)}
  .ticker-count{font-size:12px;color:var(--ink3);font-family:var(--font-mono)}
  .bar-bg{flex:0 0 110px;width:110px;height:4px;background:var(--surface3);border-radius:2px;margin:0 10px 0 auto}
  .bar-fill{height:100%;border-radius:2px;background:var(--accent)}
  .ticker-row>.ticker-name{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .section-label{font-size:11px;font-family:var(--font-mono);color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
  .weekly-digest-btn{width:100%;padding:12px;background:var(--accent2);border:1px dashed var(--accent3);border-radius:var(--r2);cursor:pointer;font-family:var(--font-mono);font-size:12px;color:var(--accent);display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s;margin-bottom:16px}
  .weekly-digest-btn:hover{background:var(--accent3)}
  .filter-chip-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
  .filter-chip{font-size:11px;font-family:var(--font-mono);padding:3px 10px;border-radius:20px;border:1px solid var(--border2);cursor:pointer;color:var(--ink2);transition:all .15s}
  .filter-chip.active{background:var(--tag-bg);color:var(--tag-txt);border-color:var(--tag-txt)}
  .filter-chip.hash-chip.active{background:var(--hash-bg);color:var(--hash-txt);border-color:var(--hash-txt)}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:flex;align-items:flex-end;justify-content:center}
  .modal{background:var(--surface);border-radius:var(--r2) var(--r2) 0 0;padding:20px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto}
  .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .modal-title{font-family:var(--font-serif);font-size:18px}
  .modal textarea{width:100%;min-height:100px;border:1px solid var(--border2);border-radius:var(--r);padding:10px;font-size:14px;font-family:var(--font-body);color:var(--ink);background:var(--surface2);outline:none;resize:vertical}
  .modal textarea:focus{border-color:var(--accent)}
  .modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--surface);font-size:13px;font-family:var(--font-mono);padding:8px 16px;border-radius:20px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
  .toast.show{opacity:1}
  .fab{position:fixed;bottom:20px;right:max(16px,calc(50% - 240px + 16px));width:48px;height:48px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:22px;box-shadow:0 4px 16px rgba(0,100,50,0.35);display:flex;align-items:center;justify-content:center;z-index:150;transition:all .2s}
  .fab:hover{transform:scale(1.07)}
  mark{background:rgba(255,200,50,.35);border-radius:2px}

  /* ── Memo styles ── */
  .memo-list{display:flex;flex-direction:column;gap:10px}
  .memo-card{background:var(--surface);border-radius:var(--r2);border:1px solid var(--border);padding:14px;box-shadow:var(--shadow);cursor:pointer;transition:box-shadow .2s,border-color .2s}
  .memo-card:hover{box-shadow:0 2px 8px rgba(0,0,0,0.09),0 6px 24px rgba(0,0,0,0.06);border-color:var(--border2)}
  .memo-card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
  .memo-ticker{font-family:var(--font-mono);font-size:16px;font-weight:500;color:var(--tag-txt)}
  .memo-name{font-size:13px;color:var(--ink2);margin-top:1px}
  .conviction-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-family:var(--font-mono);padding:3px 9px;border-radius:20px;font-weight:500;white-space:nowrap}
  .conviction-1{background:var(--conviction-1);color:var(--conviction-1t)}
  .conviction-2{background:var(--conviction-2);color:var(--conviction-2t)}
  .conviction-3{background:var(--conviction-3);color:var(--conviction-3t)}
  .conviction-4{background:var(--conviction-4);color:var(--conviction-4t)}
  .conviction-5{background:var(--conviction-5);color:var(--conviction-5t)}
  .memo-card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
  .memo-card-reviewed{font-size:11px;font-family:var(--font-mono);color:var(--ink3)}
  .memo-card-sections{display:flex;flex-wrap:wrap;gap:4px}
  .memo-section-pip{font-size:11px;font-family:var(--font-mono);padding:1px 6px;border-radius:4px;background:var(--surface3);color:var(--ink3)}
  .memo-snippet{font-size:13px;color:var(--ink3);line-height:1.5;margin-top:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  /* full memo view */
  .memo-view{display:flex;flex-direction:column;gap:0}
  .memo-view-header{padding:16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:10}
  .memo-view-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .memo-view-ticker{font-family:var(--font-serif);font-size:26px;color:var(--ink)}
  .memo-view-name{font-size:13px;color:var(--ink3);font-family:var(--font-mono);margin-bottom:8px}
  .memo-view-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .memo-view-body{padding:16px;display:flex;flex-direction:column;gap:4px}
  .memo-section{border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:8px}
  .memo-section-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;background:var(--surface2);user-select:none}
  .memo-section-head:hover{background:var(--surface3)}
  .memo-section-label{font-size:11px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);font-weight:500}
  .memo-section-chevron{font-size:11px;color:var(--ink3);transition:transform .2s}
  .memo-section-chevron.open{transform:rotate(180deg)}
  .memo-section-content{padding:12px 14px;background:var(--surface)}
  .memo-section-content textarea{width:100%;min-height:80px;border:none;outline:none;font-size:14px;font-family:var(--font-body);color:var(--ink);background:transparent;resize:none;line-height:1.65}
  .memo-section-content textarea::placeholder{color:var(--ink3)}
  .memo-section-rendered{font-size:14px;line-height:1.65;color:var(--ink2);white-space:pre-wrap;word-break:break-word;min-height:24px}
  .memo-section-rendered:empty::after{content:attr(data-placeholder);color:var(--ink3);font-style:italic}
  .memo-edit-btn{font-size:11px;font-family:var(--font-mono);padding:3px 8px;border-radius:6px;border:1px solid var(--border2);background:transparent;cursor:pointer;color:var(--ink3);transition:all .15s}
  .memo-edit-btn:hover{border-color:var(--accent);color:var(--accent)}
  .memo-section-edit-footer{display:flex;justify-content:flex-end;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
  .conviction-selector{display:flex;gap:6px;flex-wrap:wrap}
  .conviction-opt{width:36px;height:36px;border-radius:50%;border:2px solid var(--border2);cursor:pointer;font-size:13px;font-family:var(--font-mono);font-weight:500;display:flex;align-items:center;justify-content:center;transition:all .15s;background:var(--surface2);color:var(--ink2)}
  .conviction-opt:hover{border-color:var(--accent)}
  .conviction-opt.selected{border-width:2px}
  .conviction-opt.sel-1{background:var(--conviction-1);color:var(--conviction-1t);border-color:var(--conviction-1t)}
  .conviction-opt.sel-2{background:var(--conviction-2);color:var(--conviction-2t);border-color:var(--conviction-2t)}
  .conviction-opt.sel-3{background:var(--conviction-3);color:var(--conviction-3t);border-color:var(--conviction-3t)}
  .conviction-opt.sel-4{background:var(--conviction-4);color:var(--conviction-4t);border-color:var(--conviction-4t)}
  .conviction-opt.sel-5{background:var(--conviction-5);color:var(--conviction-5t);border-color:var(--conviction-5t)}
  .log-feed{margin-top:4px}
  .log-feed-header{font-size:11px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);padding:10px 14px 6px;border-top:1px solid var(--border)}
  .log-feed-empty{font-size:13px;color:var(--ink3);font-style:italic;padding:12px 14px}
  .log-feed-item{padding:10px 14px;border-top:1px solid var(--border)}
  .log-feed-date{font-size:11px;font-family:var(--font-mono);color:var(--ink3);margin-bottom:4px}
  .log-feed-body{font-size:13px;color:var(--ink2);line-height:1.6;white-space:pre-wrap;word-break:break-word}
  .back-btn{display:flex;align-items:center;gap:5px;font-size:13px;font-family:var(--font-mono);color:var(--ink3);cursor:pointer;padding:2px 0;transition:color .15s;background:none;border:none}
  .back-btn:hover{color:var(--accent)}
  .memo-add-section-btn{width:100%;padding:10px;background:transparent;border:1px dashed var(--border2);border-radius:var(--r);cursor:pointer;font-family:var(--font-mono);font-size:12px;color:var(--ink3);display:flex;align-items:center;justify-content:center;gap:5px;transition:all .2s;margin-top:4px;margin-bottom:8px}
  .memo-add-section-btn:hover{border-color:var(--accent);color:var(--accent)}
  .field-row{margin-bottom:12px}
  .field-label{font-size:11px;font-family:var(--font-mono);color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
  .field-input{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--r);font-size:14px;font-family:var(--font-body);color:var(--ink);background:var(--surface2);outline:none}
  .field-input:focus{border-color:var(--accent)}
  .chip-row{display:flex;gap:6px;flex-wrap:wrap}
  .section-chip{font-size:11px;font-family:var(--font-mono);padding:4px 10px;border-radius:20px;border:1px solid var(--border2);cursor:pointer;color:var(--ink2);transition:all .15s;background:var(--surface2)}
  .section-chip.active{background:var(--tag-bg);color:var(--tag-txt);border-color:var(--tag-txt)}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="topbar-row">
      <div class="brand">invest<span>.</span>diary</div>
      <div class="sync-badge" id="syncBadge" onclick="syncNow()">
        <span class="dot" id="syncDot"></span>
        <span id="syncLabel">Connect Drive</span>
      </div>
    </div>
    <div class="search-bar" id="searchBarWrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="Search entries, $MSFT, #earnings…" oninput="onSearch()">
    </div>
    <div class="filter-chip-row" id="filterChips"></div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="setTab('log')">Log</div>
    <div class="tab" onclick="setTab('memos')">Memos</div>
    <div class="tab" onclick="setTab('portfolio')">Portfolio</div>
    <div class="tab" onclick="setTab('news')">News</div>
    <div class="tab" onclick="setTab('tickers')">Tickers</div>
  </div>
  <div class="scroll-area" id="mainContent"></div>
</div>
<div class="toast" id="toast"></div>
<button class="fab" id="fab" onclick="onFab()" title="New entry">+</button>
<div id="modalRoot"></div>
<script>
const STORAGE_KEY='invest_diary_v2';
const MEMO_SECTIONS=['thesis','risks','catalysts','management','funding','valuation','technicals','reasons_to_sell','description'];
const SECTION_LABELS={thesis:'Investment Thesis',risks:'Risks',catalysts:'Catalysts',management:'Management & Shareholders',funding:'Funding',valuation:'Valuation',technicals:'Technicals',reasons_to_sell:'Reasons to Sell',description:'Description'};

let state={
  entries:[],memos:[],
  driveFileId:null,driveSynced:false,driveToken:null,
  sheetsId:null,sheetsToken:null,portfolio:[],portfolioSyncedAt:null,portfolioMeta:null,
  tickerTags:{},portSelectMode:false,portSelected:{},lastLocalChange:0,
  geminiKey:null,newsCache:{},newsLoading:{},activeNewsTicker:null,newsWindow:'7d',
  activeTicker:null,tickerSort:'recent',tickerFilter:'all',
  newsBatch:null,newsRpm:10,
  oauthClientId:null,oauthClientSecret:null,oauthRefreshToken:null,oauthAccessToken:null,oauthExpiry:0,
  activeTab:'log',searchQuery:'',filterTickers:[],filterHashes:[],
  activeMemoId:null
};

function load(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){
      const s=JSON.parse(raw);
      state.entries=s.entries||[];state.memos=s.memos||[];
      state.driveFileId=s.driveFileId||null;
      state.sheetsId=s.sheetsId||null;state.sheetsToken=s.sheetsToken||null;
      state.portfolio=s.portfolio||[];state.portfolioSyncedAt=s.portfolioSyncedAt||null;state.portfolioMeta=s.portfolioMeta||null;
      state.tickerTags=s.tickerTags||{};state.lastLocalChange=s.lastLocalChange||0;
      state.geminiKey=s.geminiKey||null;state.newsCache=s.newsCache||{};state.newsWindow=s.newsWindow||'7d';
      state.newsRpm=s.newsRpm||10;
      state.oauthClientId=s.oauthClientId||null;state.oauthClientSecret=s.oauthClientSecret||null;
      state.oauthRefreshToken=s.oauthRefreshToken||null;state.oauthAccessToken=s.oauthAccessToken||null;state.oauthExpiry=s.oauthExpiry||0;
    }
    const oldRaw=localStorage.getItem('invest_diary_v1');
    if(oldRaw&&!state.entries.length){const old=JSON.parse(oldRaw);state.entries=old.entries||[];}
  }catch(e){}
}
function save(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify({
    entries:state.entries,memos:state.memos,driveFileId:state.driveFileId,
    sheetsId:state.sheetsId,sheetsToken:state.sheetsToken,
    portfolio:state.portfolio,portfolioSyncedAt:state.portfolioSyncedAt,portfolioMeta:state.portfolioMeta,
    tickerTags:state.tickerTags,lastLocalChange:state.lastLocalChange,
    geminiKey:state.geminiKey,newsCache:state.newsCache,newsWindow:state.newsWindow,newsRpm:state.newsRpm,
    oauthClientId:state.oauthClientId,oauthClientSecret:state.oauthClientSecret,
    oauthRefreshToken:state.oauthRefreshToken,oauthAccessToken:state.oauthAccessToken,oauthExpiry:state.oauthExpiry
  }));
}
load();

function extractTickers(text){return[...new Set((text.match(/\$([A-Z]{1,5}(?:\.[A-Z]{1,2})?)/g)||[]).map(t=>t.toUpperCase()))];}
function extractHashes(text){return[...new Set((text.match(/#([a-zA-Z][a-zA-Z0-9_]*)/g)||[]).map(h=>h.toLowerCase()))];}
function renderMd(text){
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code style="font-family:var(--font-mono);font-size:12px;background:var(--surface3);padding:1px 4px;border-radius:3px">$1</code>')
    .replace(/\$([A-Z]{1,5}(?:\.[A-Z]{1,2})?)/g,'<span style="font-family:var(--font-mono);font-weight:500;color:var(--tag-txt)">$$$1</span>')
    .replace(/#([a-zA-Z][a-zA-Z0-9_]*)/g,'<span style="font-family:var(--font-mono);color:var(--hash-txt)">#$1</span>');
}
function highlight(text,query){
  if(!query)return text;
  const esc=query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return text.replace(new RegExp(`(${esc})`,'gi'),'<mark>$1</mark>');
}
function fmtDate(iso){
  const d=new Date(iso);
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})+' · '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}
function fmtDateShort(iso){return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short'});}
function fmtDateRelative(iso){
  const diff=Date.now()-new Date(iso).getTime();
  const days=Math.floor(diff/86400000);
  if(days===0)return'Today';if(days===1)return'Yesterday';if(days<7)return`${days}d ago`;
  if(days<30)return`${Math.floor(days/7)}w ago`;if(days<365)return`${Math.floor(days/30)}mo ago`;
  return`${Math.floor(days/365)}y ago`;
}
function convictionLabel(n){return['','Watching','Interested','Conviction','High Conv.','Core'][n]||'';}
function allTickers(){const map={};state.entries.forEach(e=>e.tickers.forEach(t=>{map[t]=(map[t]||0)+1;}));return Object.entries(map).sort((a,b)=>b[1]-a[1]);}
function allHashes(){const map={};state.entries.forEach(e=>e.hashes.forEach(h=>{map[h]=(map[h]||0)+1;}));return Object.entries(map).sort((a,b)=>b[1]-a[1]);}
function filteredEntries(){
  let list=[...state.entries].sort((a,b)=>new Date(b.ts)-new Date(a.ts));
  const q=state.searchQuery.trim().toLowerCase();
  if(q)list=list.filter(e=>e.text.toLowerCase().includes(q)||e.tickers.some(t=>t.toLowerCase().includes(q))||e.hashes.some(h=>h.toLowerCase().includes(q)));
  if(state.filterTickers.length)list=list.filter(e=>state.filterTickers.every(t=>e.tickers.includes(t)));
  if(state.filterHashes.length)list=list.filter(e=>state.filterHashes.every(h=>e.hashes.includes(h)));
  return list;
}
function setTab(tab,opts){
  state.activeTab=tab;
  // A bare tab click always lands on the list. Only an explicit payload
  // (e.g. goToTicker) opens a detail view.
  state.activeMemoId    = (opts&&opts.memoId) || null;
  state.activeNewsTicker= (tab==='news'    && opts && opts.ticker) ? opts.ticker : null;
  state.activeTicker    = (tab==='tickers' && opts && opts.ticker) ? opts.ticker : null;
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active',['log','memos','portfolio','news','tickers'][i]===tab);
  });
  // show/hide search bar
  const sw=document.getElementById('searchBarWrap');
  if(sw)sw.style.display=(tab==='memos'||tab==='portfolio'||tab==='news'?'none':'flex');
  const fc=document.getElementById('filterChips');
  if(fc&&(tab==='memos'||tab==='portfolio'||tab==='news'))fc.innerHTML='';
  render();
}
function onSearch(){state.searchQuery=document.getElementById('searchInput').value;render();}
function toggleFilter(type,val){
  const arr=type==='ticker'?state.filterTickers:state.filterHashes;
  const idx=arr.indexOf(val);if(idx>=0)arr.splice(idx,1);else arr.push(val);render();
}
function renderFilterChips(){
  if(state.activeTab==='memos')return;
  const chips=document.getElementById('filterChips');
  const tickers=allTickers().slice(0,8);const hashes=allHashes().slice(0,5);
  if(!tickers.length&&!hashes.length){chips.innerHTML='';return;}
  chips.innerHTML=tickers.map(([t])=>`<div class="filter-chip ${state.filterTickers.includes(t)?'active':''}" onclick="toggleFilter('ticker','${t}')">${t}</div>`).join('')
    +hashes.map(([h])=>`<div class="filter-chip hash-chip ${state.filterHashes.includes(h)?'active':''}" onclick="toggleFilter('hash','${h}')">${h}</div>`).join('');
}
function render(){
  renderFilterChips();
  refreshSyncBadge();
  ensureBatchTicker();
  const el=document.getElementById('mainContent');
  if(state.activeTab==='log')el.innerHTML=renderLog();
  else if(state.activeTab==='memos')renderMemosTab(el);
  else if(state.activeTab==='portfolio')el.innerHTML=renderPortfolio();
  else if(state.activeTab==='news')el.innerHTML=renderNews();
  else el.innerHTML=renderTickers();
  // FAB
  const fab=document.getElementById('fab');
  if(state.activeTab==='news'){fab.style.display='none';}
  else if(state.activeTab==='memos'&&state.activeMemoId){fab.style.display='none';}
  else if(state.activeTab==='memos'){fab.textContent='+';fab.style.display='flex';}
  else{fab.textContent='+';fab.style.display='flex';}
}
function onFab(){
  if(state.activeTab==='memos')openNewMemoModal();
  else openCompose();
}

/* ══════════════════════════════════════
   LOG TAB
══════════════════════════════════════ */
function renderLog(){
  const entries=filteredEntries();
  const composeHtml=`<div class="compose-card" id="composeCard" style="display:none">
    <div class="compose-label">Quick log</div>
    <textarea class="compose-area" id="composeText" placeholder="What's on your mind? Try: Bought more $MSFT today — strong earnings #thesis #tech" oninput="onComposeInput()" rows="4"></textarea>
    <div class="preview-tags" id="composeTags"></div>
    <div class="compose-footer">
      <div></div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-ghost" onclick="closeCompose()">Cancel</button>
        <button class="btn btn-primary" id="submitBtn" onclick="submitEntry()" disabled>Save entry</button>
      </div>
    </div>
  </div>`;
  if(!entries.length){
    return composeHtml+`<div class="empty-state"><div class="empty-icon">📓</div><div class="empty-title">Your diary is empty</div><div class="empty-body">Tap + to log your first investment note.<br>Use <code style="font-family:var(--font-mono);font-size:12px">$MSFT</code> for tickers and <code style="font-family:var(--font-mono);font-size:12px">#earnings</code> for tags.</div></div>`;
  }
  return composeHtml+entries.map(e=>renderEntry(e)).join('');
}
function renderEntry(e,compact=false){
  const tickerTags=e.tickers.map(t=>`<span class="tag ticker" onclick="event.stopPropagation();goToTicker('${t}')">${t}</span>`).join('');
  const hashTags=e.hashes.map(h=>`<span class="tag hash" onclick="toggleFilter('hash','${h}')">${h}</span>`).join('');
  const bodyHtml=highlight(renderMd(e.text),state.searchQuery);
  if(compact)return`<div style="padding:8px 0;border-bottom:1px solid var(--border)">
    <div class="entry-date">${fmtDate(e.ts)}</div>
    <div class="entry-body" style="font-size:13px;margin-top:4px">${bodyHtml}</div>
    <div class="entry-tags" style="margin-top:6px">${tickerTags}${hashTags}</div>
  </div>`;
  return`<div class="entry-card" id="entry-${e.id}">
    <div class="entry-meta">
      <div class="entry-date">${fmtDate(e.ts)}</div>
      <div class="entry-actions">
        <button class="icon-btn" onclick="editEntry('${e.id}')" title="Edit">✎</button>
        <button class="icon-btn" onclick="deleteEntry('${e.id}')" title="Delete">⊗</button>
      </div>
    </div>
    <div class="entry-body">${bodyHtml}</div>
    <div class="entry-tags">${tickerTags}${hashTags}</div>
    ${e.tickers.length?e.tickers.map(t=>{
      const s=t.replace(/^\$/,'').toUpperCase();
      const cached=state.newsCache[s];
      const n=cached&&cached.items?cached.items.filter(i=>i.material!==false).length:0;
      return `<button class="entry-news-btn" style="margin-top:6px" onclick="event.stopPropagation();openNewsFor('${s}')">${cached?`📰 ${s} — ${n?n+' item'+(n===1?'':'s'):'no material news'} · ${fmtDateRelative(cached.fetchedAt)}`:`↓ Fetch news for ${s}`}</button>`;
    }).join(''):''}
  </div>`;
}

/* ══════════════════════════════════════
   MEMOS TAB
══════════════════════════════════════ */
function renderMemosTab(el){
  if(state.activeMemoId){renderMemoView(el);return;}
  // list view
  if(!state.memos.length){
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">No memos yet</div><div class="empty-body">Tap + to create your first investment memo.<br>One memo per holding — your north star for conviction.</div></div>`;
    return;
  }
  const sorted=[...state.memos].sort((a,b)=>(b.updatedAt||b.createdAt||'').localeCompare(a.updatedAt||a.createdAt||''));
  el.innerHTML=`<div class="memo-list">${sorted.map(m=>renderMemoCard(m)).join('')}</div>`;
}

function renderMemoCard(m){
  const cv=m.conviction||0;
  const cvBadge=cv?`<span class="conviction-badge conviction-${cv}">${'●'.repeat(cv)} ${convictionLabel(cv)}</span>`:'<span class="conviction-badge" style="background:var(--surface3);color:var(--ink3)">No conviction set</span>';
  const filledSections=MEMO_SECTIONS.filter(s=>m.sections&&m.sections[s]&&m.sections[s].trim());
  const pips=filledSections.slice(0,4).map(s=>`<span class="memo-section-pip">${SECTION_LABELS[s].split(' ')[0]}</span>`).join('');
  const snippet=filledSections.length?m.sections[filledSections[0]].slice(0,120):'';
  return`<div class="memo-card" onclick="openMemo('${m.id}')">
    <div class="memo-card-header">
      <div>
        <div class="memo-ticker">${m.ticker}</div>
        ${m.name?`<div class="memo-name">${m.name}</div>`:''}
      </div>
      ${cvBadge}
    </div>
    ${snippet?`<div class="memo-snippet">${snippet}</div>`:''}
    <div class="memo-card-footer">
      <div class="memo-card-sections">${pips}</div>
      <div class="memo-card-reviewed">${m.updatedAt?'Updated '+fmtDateRelative(m.updatedAt):'Never reviewed'}</div>
    </div>
  </div>`;
}

function openMemo(id){
  state.activeMemoId=id;
  document.getElementById('fab').style.display='none';
  render();
}

function renderMemoView(el){
  const memo=state.memos.find(m=>m.id===state.activeMemoId);
  if(!memo){state.activeMemoId=null;render();return;}
  const cv=memo.conviction||0;
  const cvBadge=cv?`<span class="conviction-badge conviction-${cv}">${'●'.repeat(cv)} ${convictionLabel(cv)}</span>`:'<span class="conviction-badge" style="background:var(--surface3);color:var(--ink3)">Set conviction</span>';
  // always show all sections
  const sectionHtml=MEMO_SECTIONS.map(s=>renderMemoSection(memo,s)).join('');
  // log feed
  const tickerRaw=memo.ticker.replace(/^\$/,'');
  const logEntries=[...state.entries]
    .filter(e=>e.tickers.some(t=>t.replace(/^\$/,'')===tickerRaw||t===memo.ticker))
    .sort((a,b)=>new Date(a.ts)-new Date(b.ts));
  const logFeedHtml=logEntries.length
    ?logEntries.map(e=>`<div class="log-feed-item"><div class="log-feed-date">${fmtDate(e.ts)}</div><div class="log-feed-body">${renderMd(e.text)}</div></div>`).join('')
    :`<div class="log-feed-empty">No log entries for ${memo.ticker} yet.</div>`;
  el.innerHTML=`<div class="memo-view">
    <div class="memo-view-header">
      <div class="memo-view-title-row">
        <button class="back-btn" onclick="closeMemoView()">← Memos</button>
        <div style="display:flex;gap:6px">
          <button class="btn btn-ghost btn-sm" onclick="editMemoMeta('${memo.id}')">Edit</button>
          <button class="btn btn-ghost btn-sm" style="color:var(--danger);border-color:var(--danger)" onclick="deleteMemo('${memo.id}')">Delete</button>
        </div>
      </div>
      <div class="memo-view-ticker">${memo.ticker}</div>
      ${memo.name?`<div class="memo-view-name">${memo.name}</div>`:''}
      <div class="memo-view-meta">
        <span onclick="openConvictionPicker('${memo.id}')" style="cursor:pointer">${cvBadge}</span>
        ${memo.updatedAt?`<span style="font-size:11px;font-family:var(--font-mono);color:var(--ink3)">Reviewed ${fmtDateRelative(memo.updatedAt)}</span>`:''}
      </div>
    </div>
    <div class="memo-view-body">
      ${sectionHtml}

      <div class="log-feed">
        <div class="log-feed-header">Log entries · ${memo.ticker} · ${logEntries.length} total</div>
        ${logFeedHtml}
      </div>
    </div>
  </div>`;
}

function renderMemoSection(memo,sectionKey){
  const label=SECTION_LABELS[sectionKey];
  const content=memo.sections?.[sectionKey]||'';
  const editingKey=`editing_${memo.id}_${sectionKey}`;
  const isEditing=window[editingKey];
  return`<div class="memo-section" id="msec-${memo.id}-${sectionKey}">
    <div class="memo-section-head" onclick="toggleMemoSection('${memo.id}','${sectionKey}')">
      <span class="memo-section-label">${label}</span>
      <span class="memo-section-chevron open" id="chev-${memo.id}-${sectionKey}">▼</span>
    </div>
    <div class="memo-section-content" id="msc-${memo.id}-${sectionKey}">
      ${isEditing
        ?`<textarea id="msta-${memo.id}-${sectionKey}" placeholder="Write your ${label.toLowerCase()} notes here…">${content.replace(/</g,'&lt;')}</textarea>
           <div class="memo-section-edit-footer">
             <button class="btn btn-ghost btn-sm" onclick="cancelSectionEdit('${memo.id}','${sectionKey}')">Cancel</button>
             <button class="btn btn-primary btn-sm" onclick="saveSectionEdit('${memo.id}','${sectionKey}')">Save</button>
           </div>`
        :`<div class="memo-section-rendered" data-placeholder="Tap edit to add ${label.toLowerCase()} notes…">${content?renderMd(content):''}</div>
           <div style="display:flex;justify-content:flex-end;margin-top:6px">
             <button class="memo-edit-btn" onclick="startSectionEdit('${memo.id}','${sectionKey}')">Edit</button>
           </div>`
      }
    </div>
  </div>`;
}

function toggleMemoSection(memoId,sectionKey){
  const content=document.getElementById(`msc-${memoId}-${sectionKey}`);
  const chev=document.getElementById(`chev-${memoId}-${sectionKey}`);
  if(!content)return;
  const hidden=content.style.display==='none';
  content.style.display=hidden?'block':'none';
  if(chev)chev.classList.toggle('open',hidden);
}

function startSectionEdit(memoId,sectionKey){
  window[`editing_${memoId}_${sectionKey}`]=true;
  const el=document.getElementById('mainContent');
  renderMemoView(el);
  setTimeout(()=>{
    const ta=document.getElementById(`msta-${memoId}-${sectionKey}`);
    if(ta){ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);}
  },50);
}
function cancelSectionEdit(memoId,sectionKey){
  window[`editing_${memoId}_${sectionKey}`]=false;
  renderMemoView(document.getElementById('mainContent'));
}
function saveSectionEdit(memoId,sectionKey){
  const ta=document.getElementById(`msta-${memoId}-${sectionKey}`);
  if(!ta)return;
  const memo=state.memos.find(m=>m.id===memoId);
  if(!memo)return;
  if(!memo.sections)memo.sections={};
  memo.sections[sectionKey]=ta.value;
  memo.updatedAt=new Date().toISOString();
  window[`editing_${memoId}_${sectionKey}`]=false;
  save();
  showToast('Section saved');
  renderMemoView(document.getElementById('mainContent'));
  if(state.driveSynced)scheduleDriveSync();
}

function openConvictionPicker(memoId){
  const memo=state.memos.find(m=>m.id===memoId);
  if(!memo)return;
  const cv=memo.conviction||0;
  const opts=[1,2,3,4,5].map(n=>`<div class="conviction-opt ${cv===n?`selected sel-${n}`:''}" onclick="setConviction('${memoId}',${n})">${n}</div>`).join('');
  const root=document.getElementById('modalRoot');
  root.innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-header"><div class="modal-title">Conviction — ${memo.ticker}</div><button class="icon-btn" onclick="closeModal()">✕</button></div>
      <div style="margin-bottom:12px;font-size:13px;color:var(--ink2)">1 = Watching · 2 = Interested · 3 = Conviction · 4 = High Conv. · 5 = Core</div>
      <div class="conviction-selector">${opts}</div>
      <div class="modal-footer"><button class="btn btn-ghost" onclick="setConviction('${memoId}',0)">Clear</button><button class="btn btn-ghost" onclick="closeModal()">Done</button></div>
    </div>
  </div>`;
}
function setConviction(memoId,n){
  const memo=state.memos.find(m=>m.id===memoId);
  if(!memo)return;
  memo.conviction=n;memo.updatedAt=new Date().toISOString();
  save();closeModal();
  renderMemoView(document.getElementById('mainContent'));
  showToast('Conviction updated');
}



function openNewMemoModal(){
  const root=document.getElementById('modalRoot');
  root.innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-header"><div class="modal-title">New memo</div><button class="icon-btn" onclick="closeModal()">✕</button></div>
      <div class="field-row">
        <div class="field-label">Ticker</div>
        <input class="field-input" id="newMemoTicker" placeholder="$ASML" style="font-family:var(--font-mono);font-weight:500;color:var(--tag-txt)" oninput="this.value=this.value.toUpperCase()">
      </div>
      <div class="field-row">
        <div class="field-label">Company name <span style="opacity:.5">(optional)</span></div>
        <input class="field-input" id="newMemoName" placeholder="ASML Holding N.V.">
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="createMemo()">Create</button>
      </div>
    </div>
  </div>`;
  setTimeout(()=>document.getElementById('newMemoTicker')?.focus(),100);
}
function createMemo(){
  let ticker=(document.getElementById('newMemoTicker')?.value||'').trim().toUpperCase();
  const name=(document.getElementById('newMemoName')?.value||'').trim();
  if(!ticker){showToast('Enter a ticker');return;}
  if(!ticker.startsWith('$'))ticker='$'+ticker;
  if(state.memos.find(m=>m.ticker===ticker)){showToast('Memo already exists for '+ticker);return;}
  const sections={};
  MEMO_SECTIONS.forEach(s=>{sections[s]='';});
  const memo={
    id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),
    ticker,name,conviction:0,sections,
    createdAt:new Date().toISOString(),updatedAt:null
  };
  state.memos.push(memo);
  save();closeModal();
  state.activeMemoId=memo.id;
  render();
  showToast('Memo created');
  if(state.driveSynced)scheduleDriveSync();
}

function editMemoMeta(memoId){
  const memo=state.memos.find(m=>m.id===memoId);
  if(!memo)return;
  const root=document.getElementById('modalRoot');
  root.innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-header"><div class="modal-title">Edit memo</div><button class="icon-btn" onclick="closeModal()">✕</button></div>

/* ══════════════════════════════════════
   NEWS  —  provider layer + digest UI
   The provider is deliberately isolated: swapping Gemini for real
   RNS / SEDAR+ / ASX feeds later means replacing fetchNewsFor() only.
══════════════════════════════════════ */

const GEMINI_MODEL='gemini-2.0-flash';

const NEWS_WINDOWS={
  '24h':{label:'24h', days:1,  phrase:'the last 24 hours',
         staleMs:12*3600000,
         note:'This is a daily check. Only report announcements published in the last 24 hours. If nothing was published in that window, say so plainly and return an empty items array — that is the expected and correct answer on most days. Do not reach back further to find something to report.'},
  '3d': {label:'3d',  days:3,  phrase:'the last 3 days',
         staleMs:36*3600000,
         note:'Only report announcements published in the last 3 days. This window is typically used over a weekend or after a short break, to catch the last trading day or two. An empty result is a legitimate answer — do not stretch the window to fill the list.'},
  '7d': {label:'7d',  days:7,  phrase:'the last 7 days',
         staleMs:3*86400000,
         note:'Only report announcements published in the last 7 days. An empty result is a legitimate answer. Do not widen the window to fill the list.'},
  '30d':{label:'30d', days:30, phrase:'the last 30 days',
         staleMs:7*86400000,
         note:'Only report announcements published in the last 30 days.'},
  '90d':{label:'90d', days:90, phrase:'the last 90 days',
         staleMs:21*86400000,
         note:'Report announcements published in the last 90 days. This is a catch-up review, so include anything material even if you have to work back through several months of filings.'},
};
function currentWindow(){return NEWS_WINDOWS[state.newsWindow]||NEWS_WINDOWS['7d'];}
function windowCutoffISO(){
  const w=currentWindow();
  return new Date(Date.now()-w.days*86400000).toISOString().slice(0,10);
}

// Every ticker we care about: portfolio holdings + anything mentioned in the log
function newsUniverse(){
  const map={};
  state.portfolio.forEach(h=>{
    map[h.symbol]={symbol:h.symbol,inPortfolio:true,weight:h.weight_pct||0};
  });
  state.entries.forEach(e=>{
    e.tickers.forEach(t=>{
      const s=t.replace(/^\$/,'').toUpperCase();
      if(!map[s])map[s]={symbol:s,inPortfolio:false,weight:0};
    });
  });
  return Object.values(map).sort((a,b)=>{
    if(a.inPortfolio!==b.inPortfolio)return a.inPortfolio?-1:1;
    return b.weight-a.weight;
  });
}

// Everything we know about a ticker, to steer the search and the analysis
function tickerContext(symbol){
  const s=symbol.replace(/^\$/,'').toUpperCase();
  const tag=state.tickerTags[s]||{};
  const holding=state.portfolio.find(h=>h.symbol===s);
  const memo=state.memos.find(m=>m.ticker==='$'+s||m.ticker===s);
  return {
    symbol:s,
    legalName: tag.legalName||tag.name||(holding?holding.name:'')||'',
    sector:    tag.sector||'',
    geography: tag.geography||'',
    weight:    holding?holding.weight_pct:0,
    inPortfolio: !!holding,
    memo,
    thesis:    memo&&memo.sections?(memo.sections.thesis||''):'',
    risks:     memo&&memo.sections?(memo.sections.risks||''):'',
    catalysts: memo&&memo.sections?(memo.sections.catalysts||''):'',
    conviction: memo?memo.conviction:0,
    recentLogs: state.entries
      .filter(e=>e.tickers.some(t=>t.replace(/^\$/,'').toUpperCase()===s))
      .sort((a,b)=>new Date(b.ts)-new Date(a.ts))
      .slice(0,3)
      .map(e=>({date:fmtDateShort(e.ts),text:e.text.slice(0,300)})),
  };
}

function buildNewsPrompt(ctx){
  const w=currentWindow();
  const cutoff=windowCutoffISO();
  const today=new Date().toISOString().slice(0,10);

  const hasMemo=!!(ctx.thesis||ctx.risks||ctx.catalysts);
  const thesisBlock=hasMemo
    ? `The investor's own memo on this holding:
${ctx.thesis?`THESIS: ${ctx.thesis}`:''}
${ctx.risks?`RISKS: ${ctx.risks}`:''}
${ctx.catalysts?`CATALYSTS: ${ctx.catalysts}`:''}
${ctx.conviction?`CONVICTION: ${ctx.conviction}/5`:''}`
    : `The investor has not written a memo for this holding yet. Assess relevance against a generic long-horizon thesis for a ${ctx.sector||'resources'} company${ctx.geography?' operating in '+ctx.geography:''}: does this news change the resource or reserve picture, the funding position, the permitting or political risk, management's credibility, or the path to production and cash flow?`;

  const recent=ctx.recentLogs.length
    ? `\nThe investor's recent notes on this holding:\n`+ctx.recentLogs.map(l=>`- [${l.date}] ${l.text}`).join('\n')
    : '';

  return `You are checking recent news for ONE company on behalf of a long-horizon private investor. This is a focused single-company task — give it your full attention.

COMPANY: ${ctx.legalName||ctx.symbol}
TICKER: ${ctx.symbol}${ctx.sector?`\nSECTOR: ${ctx.sector}`:''}${ctx.geography?`\nGEOGRAPHY: ${ctx.geography}`:''}${ctx.inPortfolio?`\nPORTFOLIO WEIGHT: ${(ctx.weight*100).toFixed(1)}%`:'\nNOT HELD — watchlist only.'}

${thesisBlock}${recent}

TIME WINDOW — STRICT
Today is ${today}. Report ONLY announcements published on or after ${cutoff} (${w.phrase}).
${w.note}
Anything published before ${cutoff} must be excluded, however interesting it is.

IDENTIFY THE RIGHT COMPANY
Small resource companies routinely share ticker symbols across exchanges. Confirm you have the correct company using the legal name and geography above before reporting anything. If you cannot confirm it with confidence, return an empty items array and explain the ambiguity in "overall". Never guess.

SOURCE PRIORITY
1. Official regulatory announcements — RNS (LSE/AIM), SEDAR+ (TSX/TSX-V), ASX announcements, SEC EDGAR filings.
2. The company's own press releases and investor relations pages.
3. Reputable financial media, and only where it reports something material that the above have not covered.
Ignore promotional content, paid research, forum posts, and speculative commentary. Prefer the primary document over any article describing it, and link to the primary document.

SEARCH PROPERLY
Search for this specific company's announcements in the window. Check the company's own news or investor relations page and the relevant exchange's announcement feed. Do not rely on memory — you must actually search, and the links you return must be to documents you found.

ON RETURNING NOTHING
An empty items array is a correct and common answer, especially over a short window. Most companies announce nothing on most days. Do not pad the list, do not stretch the date range, and do not report routine or stale items to appear thorough. Reporting nothing when nothing happened is the right behaviour and is more useful than noise.

OUTPUT
Return ONLY valid JSON. No markdown fences, no preamble, no commentary.

{
  "items": [
    {
      "date": "YYYY-MM-DD",
      "headline": "the announcement's actual title",
      "source": "RNS | SEDAR+ | ASX | SEC | Company release | publication name",
      "url": "direct link to the original document",
      "official": true,
      "summary": "2-3 sentences on what was actually announced, in your own words",
      "relevance": "What this means for the thesis above. Be specific. Say plainly if it changes nothing. If it strengthens or weakens a particular part of the thesis or a stated risk, name which part.",
      "impact": "positive" | "negative" | "neutral",
      "material": true
    }
  ],
  "overall": "2-3 sentences: taken together, what has changed for this holding? If nothing was announced in the window, say exactly that."
}

Order items newest first. Set "material" to false for routine filings that change nothing (AGM notices, TR-1s, option grants, holding notifications). Set "official" to false for media coverage. Every date must fall on or after ${cutoff}.`;
}

// ── The provider. Swap this function to change news source. ──
async function fetchNewsFor(symbol){
  if(!state.geminiKey)throw new Error('No Gemini API key set');
  const ctx=tickerContext(symbol);
  const prompt=buildNewsPrompt(ctx);

  const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${state.geminiKey}`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      contents:[{parts:[{text:prompt}]}],
      tools:[{google_search:{}}],
      generationConfig:{temperature:0.2}
    })
  });

  if(!res.ok){
    let msg=res.status===400?'Invalid API key or request':`Gemini error ${res.status}`;
    let retryAfter=0;
    try{
      const e=await res.json();
      if(e.error&&e.error.message)msg=e.error.message;
      // Google returns a RetryInfo block telling us how long to wait
      const details=(e.error&&e.error.details)||[];
      const ri=details.find(d=>(d['@type']||'').includes('RetryInfo'));
      if(ri&&ri.retryDelay){
        const m=String(ri.retryDelay).match(/([\d.]+)s/);
        if(m)retryAfter=Math.ceil(parseFloat(m[1]));
      }
    }catch(_){}
    const err=new Error(msg);
    err.status=res.status;
    err.rateLimited=(res.status===429);
    err.retryAfter=retryAfter||(res.status===429?30:0);
    throw err;
  }

  const data=await res.json();
  const cand=data.candidates&&data.candidates[0];
  if(!cand)throw new Error('Gemini returned nothing');

  const text=(cand.content&&cand.content.parts||[]).map(p=>p.text||'').join('');

  // Grounding metadata gives us the URLs Gemini actually consulted
  const grounding=cand.groundingMetadata||{};
  const chunks=grounding.groundingChunks||[];
  const sources=chunks.map(ch=>ch.web).filter(Boolean).map(w=>({title:w.title||'',uri:w.uri||''}));

  const parsed=parseNewsJson(text);
  const w=currentWindow();
  // Belt and braces: drop anything the model returned outside the window it was given
  const cutoffMs=Date.now()-w.days*86400000-86400000; // one day of slack for timezones
  const items=(parsed.items||[]).filter(it=>{
    if(!it||!it.date)return true;           // undated — keep, let the user judge
    const d=new Date(it.date).getTime();
    return isNaN(d)?true:d>=cutoffMs;
  });
  return {
    symbol:ctx.symbol,
    legalName:ctx.legalName,
    items,
    overall:parsed.overall||'',
    sources,
    hadMemo:!!(ctx.thesis||ctx.risks||ctx.catalysts),
    window:state.newsWindow,
    fetchedAt:new Date().toISOString(),
  };
}

function parseNewsJson(text){
  let t=(text||'').trim();
  // Gemini often wraps JSON in a fenced block despite instructions
  t=t.replace(/^```(?:json)?\s*/i,'').replace(/\s*```$/,'').trim();
  try{return JSON.parse(t);}catch(_){}
  // Fall back to the outermost braces
  const a=t.indexOf('{'),b=t.lastIndexOf('}');
  if(a>=0&&b>a){
    try{return JSON.parse(t.slice(a,b+1));}catch(_){}
  }
  return {items:[],overall:'Could not read the response. Try fetching again.'};
}

// ── Orchestration ──
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

// Returns 'ok' | 'error' | 'aborted'
async function fetchNewsForTicker(symbol,opts){
  const s=symbol.replace(/^\$/,'').toUpperCase();
  if(!state.geminiKey){openGeminiSetup();return 'error';}
  if(state.newsLoading[s])return 'error';
  const silent=opts&&opts.silent;
  const maxTries=3;

  state.newsLoading[s]=true;render();
  try{
    for(let attempt=1;attempt<=maxTries;attempt++){
      if(state.newsBatch&&state.newsBatch.cancel)return 'aborted';
      try{
        const digest=await fetchNewsFor(s);
        state.newsCache[s]=digest;
        save();
        if(state.driveSynced)scheduleDriveSync();
        return 'ok';
      }catch(e){
        // Rate limited — wait it out and try again rather than recording a failure
        if(e.rateLimited&&attempt<maxTries){
          const wait=Math.max(e.retryAfter||30,15)*1000*attempt;
          if(state.newsBatch){
            state.newsBatch.waitingUntil=Date.now()+wait;
            state.newsBatch.note='rate limited — waiting '+Math.ceil(wait/1000)+'s';
            render();
          }else if(!silent){
            showToast('Rate limited — retrying in '+Math.ceil(wait/1000)+'s');
          }
          await sleep(wait);
          if(state.newsBatch){
            state.newsBatch.waitingUntil=0;
            state.newsBatch.note='';
          }
          continue;
        }
        // Genuine failure, or we've run out of retries
        state.newsCache[s]={
          symbol:s,
          error:e.rateLimited?'Rate limit — try again in a minute':e.message,
          rateLimited:!!e.rateLimited,
          fetchedAt:new Date().toISOString(),
          items:[]
        };
        save();
        if(!silent)showToast(e.rateLimited?'Rate limited — pause and retry':'News fetch failed: '+e.message);
        return 'error';
      }
    }
    return 'error';
  }finally{
    delete state.newsLoading[s];
    render();
  }
}

/* Free-tier pacing.
   Gemini's free tier allows a limited number of requests per minute.
   We space calls out to stay comfortably inside it, and the batch is
   pausable, resumable, and cancellable so a long sweep is never a trap. */

function paceMs(){
  const rpm=Math.max(1,state.newsRpm||10);
  return Math.ceil(60000/rpm)+500;   // a little headroom
}

async function runNewsBatch(tickers,label){
  if(!state.geminiKey){openGeminiSetup();return;}
  if(!tickers.length){showToast('Nothing to check');return;}
  if(state.newsBatch){showToast('A batch is already running');return;}

  const w=currentWindow();
  const est=Math.ceil(tickers.length*paceMs()/60000);
  const ok=confirm(
    `Check ${tickers.length} ticker${tickers.length===1?'':'s'} for news in ${w.phrase}?\n\n`+
    `Paced for the free tier — roughly ${est} minute${est===1?'':'s'}.\n`+
    `You can leave this tab open and come back; the app keeps working.`
  );
  if(!ok)return;

  state.newsBatch={
    total:tickers.length, done:0, ok:0, failed:0,
    current:null, cancel:false, paused:false,
    waitingUntil:0, note:'', label:label||'News',
    startedAt:Date.now(),
  };
  render();

  for(let i=0;i<tickers.length;i++){
    if(state.newsBatch.cancel)break;

    // Honour a pause without burning CPU
    while(state.newsBatch.paused&&!state.newsBatch.cancel){
      await sleep(300);
    }
    if(state.newsBatch.cancel)break;

    const sym=tickers[i].symbol||tickers[i];
    state.newsBatch.current=sym;
    render();

    const result=await fetchNewsForTicker(sym,{silent:true});
    if(result==='aborted')break;

    state.newsBatch.done++;
    if(result==='ok')state.newsBatch.ok++; else state.newsBatch.failed++;
    render();

    // Pace the next call, unless we're done
    if(i<tickers.length-1&&!state.newsBatch.cancel){
      const gap=paceMs();
      state.newsBatch.waitingUntil=Date.now()+gap;
      render();
      await sleep(gap);
      state.newsBatch.waitingUntil=0;
    }
  }

  const b=state.newsBatch;
  const cancelled=b.cancel;
  const {ok:okCount,failed}=b;
  state.newsBatch=null;
  render();

  if(cancelled){
    showToast(`Stopped — ${okCount} checked`);
  }else if(failed){
    showToast(`Checked ${okCount}, ${failed} failed`);
  }else{
    showToast(`Checked ${okCount} ticker${okCount===1?'':'s'}`);
  }
}

function cancelNewsBatch(){

  state.newsBatch.cancel=true;
  state.newsBatch.paused=false;

}

function renderBatchBar(){
  const b=state.newsBatch;
  if(!b)return '<div id="batchBar"></div>';
  const pct=b.total?Math.round(b.done/b.total*100):0;
  const waiting=b.waitingUntil&&b.waitingUntil>Date.now();
  const secs=waiting?Math.ceil((b.waitingUntil-Date.now())/1000):0;

  let status;
  if(b.paused)            status='paused';
  else if(b.note)         status=b.note;
  else if(waiting)        status=`next in ${secs}s`;
  else if(b.current)      status=`searching ${b.current}…`;
  else                    status='starting…';

  return `<div id="batchBar" style="background:var(--accent2);border:1px solid var(--accent3);border-radius:var(--r2);padding:12px 14px;margin-bottom:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px">
      <div style="min-width:0">
        <div style="font-family:var(--font-mono);font-size:12px;color:var(--accent)">${b.done} of ${b.total}${b.failed?` · ${b.failed} failed`:''}</div>
        <div style="font-size:11px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${status}</div>

      <div style="height:100%;width:${pct}%;background:var(--accent);border-radius:2px;transition:width .3s"></div>
    </div>
  </div>`;
}

  const batching=!!state.newsBatch;
  const toolbar=`<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">
    <button class="btn btn-primary btn-sm" ${anyLoading||batching||!staleCount?'disabled':''} onclick="fetchStaleNews()">↻ Check ${staleCount||'all'} ${staleCount===1?'ticker':'tickers'}</button>
    <button class="btn btn-ghost btn-sm" ${anyLoading||batching?'disabled':''} onclick="fetchAllNews()">Recheck all</button>
    <button class="btn btn-ghost btn-sm" onclick="openGeminiSetup()">⚙</button>
  </div>`;

  const summary=cached?`<div style="font-size:11px;font-family:var(--font-mono);color:var(--ink3);margin-bottom:12px;text-align:center">${cached} of ${universe.length} fetched · ${materialCount} material item${materialCount===1?'':'s'}</div>`:'';

  const rows=universe.map(t=>{
    const c=state.newsCache[t.symbol];
    const loading=!!state.newsLoading[t.symbol];
    const tag=state.tickerTags[t.symbol]||{};
    const holding=state.portfolio.find(h=>h.symbol===t.symbol);
    const name=tag.legalName||tag.name||(holding?holding.name:'')||'';

    let right,statusLine;
    if(loading){
      right=`<span class="dot pulse" style="background:var(--accent)"></span>`;
      statusLine=`<span style="color:var(--accent)">searching…</span>`;
    }else if(!c){
      right=`<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();fetchNewsForTicker('${t.symbol}')">Fetch</button>`;
      statusLine=`<span style="color:var(--ink3)">not fetched</span>`;
    }else if(c.error){
      const rl=c.rateLimited;
      right=`<button class="btn btn-ghost btn-sm" ${batching?'disabled':''} onclick="event.stopPropagation();fetchNewsForTicker('${t.symbol}')">Retry</button>`;
      statusLine=`<span style="color:${rl?'var(--warn-txt)':'var(--danger)'}">${rl?'rate limited — retry':c.error.slice(0,40)}</span>`;
    }else{
      const material=(c.items||[]).filter(i=>i.material!==false);
      const pos=material.filter(i=>i.impact==='positive').length;
      const neg=material.filter(i=>i.impact==='negative').length;
      const pills=[
        pos?`<span style="color:var(--accent)">▲${pos}</span>`:'',
        neg?`<span style="color:var(--danger)">▼${neg}</span>`:'',
      ].filter(Boolean).join(' ');
      const winLabel=c.window&&c.window!==state.newsWindow?`<span style="color:var(--warn-txt)"> ${NEWS_WINDOWS[c.window]?NEWS_WINDOWS[c.window].label:c.window}</span>`:'';
      right=`<div style="text-align:right"><div style="font-family:var(--font-mono);font-size:12px">${material.length?pills||material.length:'—'}</div><div style="font-size:10px;font-family:var(--font-mono);color:var(--ink3)">${fmtDateRelative(c.fetchedAt)}${winLabel}</div></div>`;
      statusLine=material.length
        ?`<span style="color:var(--ink2)">${material.length} item${material.length===1?'':'s'}</span>`
        :`<span style="color:var(--ink3)">nothing announced</span>`;
    }

    const weightLine=t.inPortfolio?`${(t.weight*100).toFixed(1)}%`:'watchlist';
    return `<div class="ticker-row" onclick="openNewsDetail('${t.symbol}')" style="align-items:center">
      <div style="min-width:0;flex:1">
        <div style="display:flex;align-items:baseline;gap:6px">
          <span class="ticker-name">${t.symbol}</span>
          <span style="font-size:10px;font-family:var(--font-mono);color:var(--ink3)">${weightLine}</span>
        </div>
        <div style="font-size:11px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${name||''}</div>
        <div style="font-size:10px;font-family:var(--font-mono);margin-top:1px">${statusLine}</div>
      </div>
      <div style="margin-left:10px;flex-shrink:0">${right}</div>
    </div>`;
  }).join('');

  return windowPicker+toolbar+renderBatchBar()+summary+`<div class="ticker-list" style="margin-bottom:60px">${rows}</div>`;
}

function renderNewsDetail(sym){
  const c=state.newsCache[sym];
  const ctx=tickerContext(sym);
  const loading=!!state.newsLoading[sym];

  const header=`<div style="margin-bottom:14px">
    <button class="back-btn" onclick="closeNewsDetail()" style="margin-bottom:10px">← News</button>
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">
      <div style="min-width:0">
        <div style="font-family:var(--font-serif);font-size:24px">${sym}</div>
        ${ctx.legalName?`<div style="font-size:13px;color:var(--ink3);font-family:var(--font-mono)">${ctx.legalName}</div>`:''}
      </div>
      <button class="btn btn-ghost btn-sm" ${loading?'disabled':''} onclick="fetchNewsForTicker('${sym}')" style="flex-shrink:0">${loading?'Searching…':(c?'↻ Refresh':'Fetch news')}</button>
    </div>
    ${ctx.inPortfolio||ctx.sector?`<div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;font-family:var(--font-mono);font-size:11px">
      ${ctx.inPortfolio?`<span style="color:var(--ink3)">${(ctx.weight*100).toFixed(1)}% of portfolio</span>`:'<span style="color:var(--ink3)">watchlist</span>'}
      ${ctx.sector?`<span style="color:var(--hash-txt)">${ctx.sector}</span>`:''}
      ${ctx.memo?`<span style="color:var(--accent);cursor:pointer" onclick="setTab('memos',{memoId:'${ctx.memo.id}'})">memo →</span>`:'<span style="color:var(--warn-txt)">no memo</span>'}
    </div>`:''}
  </div>`;

  if(loading){
    return header+`<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">Searching</div><div class="empty-body">Looking for regulatory announcements and company releases…</div></div>`;
  }
  if(!c){
    return header+`<div class="empty-state"><div class="empty-icon">📰</div><div class="empty-body">No digest yet for ${sym}.</div></div>`;
  }
  if(c.error){
    return header+`<div class="news-config" style="background:var(--warn-bg);color:var(--warn-txt)"><strong>Fetch failed</strong><br>${c.error}</div>`;
  }

  const items=c.items||[];
  const material=items.filter(i=>i.material!==false);
  const routine=items.filter(i=>i.material===false);

  const overall=c.overall?`<div style="background:var(--accent2);border:1px solid var(--accent3);border-radius:var(--r2);padding:12px 14px;margin-bottom:14px">
    <div class="section-label" style="margin-bottom:6px;color:var(--accent)">The picture</div>
    <div style="font-size:14px;line-height:1.6;color:var(--ink)">${c.overall}</div>
    ${!c.hadMemo?`<div style="font-size:11px;font-family:var(--font-mono);color:var(--ink3);margin-top:8px">Assessed against a generic thesis — write a memo for ${sym} to sharpen this.</div>`:''}
  </div>`:'';

  const renderItem=(n)=>{
    const impactColor=n.impact==='positive'?'var(--accent)':n.impact==='negative'?'var(--danger)':'var(--ink3)';
    const impactMark=n.impact==='positive'?'▲':n.impact==='negative'?'▼':'●';
    return `<div class="entry-card" style="margin-bottom:10px">
      <div class="entry-meta">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span style="color:${impactColor};font-size:12px">${impactMark}</span>
          <span class="entry-date">${n.date||''}</span>
          ${n.source?`<span style="font-family:var(--font-mono);font-size:10px;padding:1px 6px;border-radius:4px;background:${n.official?'var(--tag-bg)':'var(--surface3)'};color:${n.official?'var(--tag-txt)':'var(--ink3)'}">${n.source}</span>`:''}
        </div>
      </div>
      <div style="font-size:14px;font-weight:500;color:var(--ink);line-height:1.45;margin-bottom:6px">${n.headline||''}</div>
      ${n.summary?`<div style="font-size:13px;color:var(--ink2);line-height:1.6;margin-bottom:8px">${n.summary}</div>`:''}
      ${n.relevance?`<div style="font-size:13px;line-height:1.6;color:var(--ink);border-left:2px solid ${impactColor};padding-left:10px;margin-bottom:8px">${n.relevance}</div>`:''}
      ${n.url?`<a href="${n.url}" target="_blank" rel="noopener" style="font-family:var(--font-mono);font-size:11px;color:var(--accent);text-decoration:none">Read the original →</a>`:''}
    </div>`;
  };

  const usedWindow=c.window&&NEWS_WINDOWS[c.window]?NEWS_WINDOWS[c.window]:currentWindow();
  const materialHtml=material.length
    ? `<div class="section-label">Material — ${material.length}</div>`+material.map(renderItem).join('')
    : `<div class="news-config" style="margin-bottom:14px">Nothing announced in ${usedWindow.phrase}.</div>`;

  const routineHtml=routine.length
    ? `<div class="section-label" style="margin-top:8px">Routine — ${routine.length}</div>`+routine.map(renderItem).join('')
    : '';

  const sourcesHtml=(c.sources&&c.sources.length)
    ? `<div class="news-panel" style="margin-bottom:60px">
        <div class="news-panel-header">Sources consulted</div>
        ${c.sources.slice(0,10).map(s=>`<div class="news-item"><a href="${s.uri}" target="_blank" rel="noopener" style="color:var(--ink2);text-decoration:none;font-size:12px">${s.title||s.uri}</a></div>`).join('')}
      </div>`
    : '<div style="margin-bottom:60px"></div>';

  const staleWarn=c.window&&c.window!==state.newsWindow?` · asked for ${usedWindow.label}, now showing ${currentWindow().label}`:'';
  const stamp=`<div style="font-size:11px;font-family:var(--font-mono);color:var(--ink3);text-align:center;margin:14px 0">Checked ${fmtDateRelative(c.fetchedAt)} over ${usedWindow.phrase}${staleWarn?`<br><span style="color:var(--warn-txt)">${staleWarn.slice(3)}</span>`:''}</div>`;

  return header+overall+materialHtml+routineHtml+stamp+sourcesHtml;
}

/* ══════════════════════════════════════
   TICKERS  —  the archive.
   Every ticker ever touched, from any source. Holdings, watchlist,
   and sold positions all keep their history here.
══════════════════════════════════════ */

// Everything known about every ticker, from every source
function tickerArchive(){
  const map={};
  const touch=(sym)=>{
    const s=sym.replace(/^\$/,'').toUpperCase();
    if(!map[s])map[s]={symbol:s,entries:[],holding:null,memo:null,news:null};
    return map[s];
  };

  state.entries.forEach(e=>{
    e.tickers.forEach(t=>{ touch(t).entries.push(e); });
  });
  state.portfolio.forEach(h=>{ touch(h.symbol).holding=h; });
  state.memos.forEach(m=>{ touch(m.ticker).memo=m; });
  Object.keys(state.newsCache).forEach(s=>{ touch(s).news=state.newsCache[s]; });
  Object.keys(state.tickerTags).forEach(s=>{ touch(s); });

  return Object.values(map).map(t=>{
    const tag=state.tickerTags[t.symbol]||{};
    t.entries.sort((a,b)=>new Date(b.ts)-new Date(a.ts));
    t.name      = tag.name||tag.legalName||(t.holding?t.holding.name:'')||'';
    t.sector    = tag.sector||'';
    t.geography = tag.geography||'';
    t.weight    = t.holding?t.holding.weight_pct:0;
    t.lastTouch = t.entries.length?new Date(t.entries[0].ts).getTime():0;
    // held now / watched (logged, never held) / closed (has history, not held now)
    t.status = t.holding ? 'held' : (t.entries.length||t.memo ? 'closed' : 'watched');
    // "closed" only makes sense if there IS history; otherwise it's just a tag with nothing behind it
    if(!t.holding && !t.entries.length && !t.memo) t.status='watched';
    return t;
  });
}

const TICKER_FILTERS={
  all:    {label:'All',       test:()=>true},
  held:   {label:'Held',      test:t=>!!t.holding},
  closed: {label:'Not held',  test:t=>!t.holding&&(t.entries.length||t.memo)},
  memo:   {label:'Has memo',  test:t=>!!t.memo},
  nomemo: {label:'No memo',   test:t=>!t.memo&&(t.entries.length||t.holding)},
};
const TICKER_SORTS={
  recent: {label:'Recent',  cmp:(a,b)=>b.lastTouch-a.lastTouch},
  weight: {label:'Weight',  cmp:(a,b)=>(b.weight-a.weight)||(b.entries.length-a.entries.length)},
  logs:   {label:'Logs',    cmp:(a,b)=>b.entries.length-a.entries.length},
  az:     {label:'A–Z',     cmp:(a,b)=>a.symbol.localeCompare(b.symbol)},
};
function setTickerFilter(f){state.tickerFilter=f;save();render();}
function setTickerSort(s){state.tickerSort=s;save();render();}
function openTicker(sym){state.activeTicker=sym.replace(/^\$/,'').toUpperCase();render();}
// The one way in to a ticker from anywhere in the app
function goToTicker(sym){
  setTab('tickers',{ticker:sym.replace(/^\$/,'').toUpperCase()});
}
function closeTicker(){state.activeTicker=null;render();}

function renderTickers(){
  if(state.activeTicker)return renderTickerDetail(state.activeTicker);

  const all=tickerArchive();
  if(!all.length){
    return `<div class="empty-state"><div class="empty-icon">🗂</div><div class="empty-title">Nothing tracked yet</div><div class="empty-body">Log an entry with a <code style="font-family:var(--font-mono);font-size:12px">$TICKER</code> or import a portfolio, and everything you touch will be archived here.</div></div>`;
  }

  const f=TICKER_FILTERS[state.tickerFilter]||TICKER_FILTERS.all;
  const s=TICKER_SORTS[state.tickerSort]||TICKER_SORTS.recent;
  const list=all.filter(f.test).sort(s.cmp);

  const counts={
    all:all.length,
    held:all.filter(TICKER_FILTERS.held.test).length,
    closed:all.filter(TICKER_FILTERS.closed.test).length,
    memo:all.filter(TICKER_FILTERS.memo.test).length,
    nomemo:all.filter(TICKER_FILTERS.nomemo.test).length,
  };

  const filters=`<div class="filter-chip-row" style="margin-bottom:8px">
    ${Object.keys(TICKER_FILTERS).map(k=>`<div class="filter-chip ${state.tickerFilter===k?'active':''}" onclick="setTickerFilter('${k}')">${TICKER_FILTERS[k].label}${counts[k]?` ${counts[k]}`:''}</div>`).join('')}
  </div>`;

  const sorts=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
    <span class="section-label" style="margin:0">Sort</span>
    <div style="display:flex;gap:4px">
      ${Object.keys(TICKER_SORTS).map(k=>`<div class="filter-chip ${state.tickerSort===k?'active':''}" onclick="setTickerSort('${k}')">${TICKER_SORTS[k].label}</div>`).join('')}
    </div>
  </div>`;

  const rows=list.map(t=>{
    const statusPill = t.holding
      ? `<span style="font-family:var(--font-mono);font-size:10px;color:var(--accent)">${(t.weight*100).toFixed(1)}%</span>`
      : (t.entries.length||t.memo)
        ? `<span style="font-family:var(--font-mono);font-size:10px;color:var(--ink3)">not held</span>`
        : `<span style="font-family:var(--font-mono);font-size:10px;color:var(--ink3)">—</span>`;

    const bits=[];
    if(t.entries.length)bits.push(`${t.entries.length} log${t.entries.length===1?'':'s'}`);
    if(t.memo)bits.push(`memo${t.memo.conviction?` ${t.memo.conviction}/5`:''}`);
    const news=t.news&&t.news.items?t.news.items.filter(i=>i.material!==false).length:0;
    if(news)bits.push(`${news} news`);
    const meta=bits.length?bits.join(' · '):'nothing yet';

    const lastLine=t.entries.length?fmtDateRelative(t.entries[0].ts):'';

    return `<div class="ticker-row" onclick="openTicker('${t.symbol}')" style="align-items:center">
      <div style="min-width:0;flex:1">
        <div style="display:flex;align-items:baseline;gap:6px">
          <span class="ticker-name">${t.symbol}</span>
          ${statusPill}
        </div>
        ${t.name?`<div style="font-size:11px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.name}</div>`:''}
        <div style="font-size:10px;font-family:var(--font-mono);color:var(--ink3);margin-top:1px">${meta}</div>
      </div>
      ${lastLine?`<div style="font-size:10px;font-family:var(--font-mono);color:var(--ink3);flex-shrink:0;margin-left:10px">${lastLine}</div>`:''}
    </div>`;
  }).join('');

  const hashes=allHashes();
  const hashList=hashes.length?`<div class="section-label" style="margin-top:20px">Tags</div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:60px">${hashes.map(([h,n])=>`<div class="tag hash" onclick="filterByHash('${h}')" style="padding:4px 12px;font-size:13px">${h} <span style="opacity:.6">${n}</span></div>`).join('')}</div>`:'<div style="margin-bottom:60px"></div>';

  return filters+sorts+`<div class="ticker-list">${rows}</div>`+hashList;
}

function renderTickerDetail(sym){
  const t=tickerArchive().find(x=>x.symbol===sym);
  if(!t){state.activeTicker=null;return renderTickers();}

  const tag=state.tickerTags[sym]||{};
  const news=t.news;
  const materialNews=news&&news.items?news.items.filter(i=>i.material!==false):[];

  // Header
  const statusLine=t.holding
    ? `<span style="color:var(--accent)">${(t.weight*100).toFixed(1)}% of portfolio</span>`
    : (t.entries.length||t.memo)
      ? `<span style="color:var(--ink3)">not currently held</span>`
      : `<span style="color:var(--ink3)">no position</span>`;

  const tagLine=[tag.sector,tag.geography].filter(Boolean).join(' · ');

  const header=`<div style="margin-bottom:16px">
    <button class="back-btn" onclick="closeTicker()" style="margin-bottom:10px">← Tickers</button>
    <div style="font-family:var(--font-serif);font-size:26px">${t.symbol}</div>
    ${t.name?`<div style="font-size:13px;color:var(--ink3);font-family:var(--font-mono);margin-bottom:6px">${t.name}</div>`:''}
    <div style="display:flex;gap:10px;flex-wrap:wrap;font-family:var(--font-mono);font-size:11px">
      ${statusLine}
      ${tagLine?`<span style="color:var(--hash-txt)">${tagLine}</span>`:''}
    </div>
  </div>`;

  // Actions — go where the depth is
  const actions=`<div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap">
    ${t.memo
      ? `<button class="btn btn-ghost btn-sm" onclick="setTab('memos',{memoId:'${t.memo.id}'})">Open memo${t.memo.conviction?` · ${t.memo.conviction}/5`:''}</button>`
      : `<button class="btn btn-primary btn-sm" onclick="prefillNewMemo('${t.symbol}')">Write memo</button>`}
    <button class="btn btn-ghost btn-sm" onclick="openNewsFor('${t.symbol}')">${news?`News · ${materialNews.length||'0'}`:'Fetch news'}</button>
    <button class="btn btn-ghost btn-sm" onclick="composeForTicker('${t.symbol}')">+ Log entry</button>
  </div>`;

  // Memo summary, if one exists
  const memoBlock=t.memo&&t.memo.sections&&t.memo.sections.thesis
    ? `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px;margin-bottom:16px">
        <div class="section-label" style="margin-bottom:6px">Thesis</div>
        <div style="font-size:13px;line-height:1.6;color:var(--ink2)">${renderMd(t.memo.sections.thesis.slice(0,400))}${t.memo.sections.thesis.length>400?'…':''}</div>
      </div>`
    : '';

  // Latest news, if fetched
  const newsBlock=materialNews.length
    ? `<div class="section-label">Latest news</div>
       <div style="margin-bottom:16px">
         ${materialNews.slice(0,2).map(n=>{
           const col=n.impact==='positive'?'var(--accent)':n.impact==='negative'?'var(--danger)':'var(--ink3)';
           const mark=n.impact==='positive'?'▲':n.impact==='negative'?'▼':'●';
           return `<div class="ticker-row" style="cursor:pointer;align-items:flex-start" onclick="openNewsFor('${t.symbol}')">
             <span style="color:${col};margin-right:8px;flex-shrink:0">${mark}</span>
             <div style="min-width:0;flex:1">
               <div style="font-size:13px;color:var(--ink);line-height:1.4">${n.headline||''}</div>
               <div style="font-size:10px;font-family:var(--font-mono);color:var(--ink3);margin-top:2px">${n.date||''}${n.source?` · ${n.source}`:''}</div>
             </div>
           </div>`;
         }).join('')}
       </div>`
    : '';

  // The archive itself — every log entry, newest first
  const logBlock=t.entries.length
    ? `<div class="section-label">History — ${t.entries.length} ${t.entries.length===1?'entry':'entries'}</div>
       <div style="margin-bottom:60px">
         ${t.entries.map(e=>`<div class="entry-card" style="margin-bottom:8px">
           <div class="entry-meta">
             <div class="entry-date">${fmtDate(e.ts)}</div>
             <div class="entry-actions">
               <button class="icon-btn" onclick="event.stopPropagation();editEntry('${e.id}')" title="Edit">✎</button>
             </div>
           </div>
           <div class="entry-body">${renderMd(e.text)}</div>
           ${e.hashes.length?`<div class="entry-tags">${e.hashes.map(h=>`<span class="tag hash" onclick="event.stopPropagation();filterByHash('${h}')">${h}</span>`).join('')}</div>`:''}
         </div>`).join('')}
       </div>`
    : `<div class="news-config" style="margin-bottom:60px">No log entries for ${t.symbol} yet.</div>`;

  return header+actions+memoBlock+newsBlock+logBlock;
}

  // sector & geography aggregation from tags

  const geoHtml=geoRows.map(([g,w])=>`

      <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(w/maxGeo*100)}%"></div></div>

  const geoSection=geoRows.length?`<div class="section-label">Geography</div><div class="ticker-list" style="margin-bottom:16px">${geoHtml}</div>`:'';

  // selection mode toolbar
  const selMode=state.portSelectMode;

  const tagToolbar=selMode
    ?`<div style="display:flex;gap:6px;margin-bottom:12px;align-items:center;flex-wrap:wrap">
        <span style="font-size:12px;font-family:var(--font-mono);color:var(--accent)">${selCount} selected</span>

      </div>`;
